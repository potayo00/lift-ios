name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Generate app icons and splash screens
        run: npx @capacitor/assets generate --ios

      - name: Sync web app into iOS project
        run: npx cap sync ios

      - name: Build (unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r Lift.ipa Payload
          ls -la Lift.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lift-ipa
          path: Lift.ipa
          retention-days: 30
